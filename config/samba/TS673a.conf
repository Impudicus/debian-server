# GLOBAL CONFIG
[global]
    server role = standalone server
    workgroup = WORKGROUP
    security = user
    map to guest = bad user

# SHARES
[downloads]
    comment = Download Folder
    path = /mnt/pool1/downloads/
    public = yes
    writable = yes
    printable = no
    guest ok = no
    create mask = 0644
    directory mask = 0755
